
<!doctype html>
<html lang="en">
 <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
 </head>
 <body class="container">
  
    <div class="mt-5">
        <button id="btn" class="btn btn-primary" onclick="show()">Open</button>

        <div hidden class="mt-5 card w-64" id="myalert" role="alert">
            <div class="card-body">
              <h5 class="card-title">Card title</h5>
              <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
              <button class="btn btn-primary" onclick="remove()">Close</button>
            </div>
        </div>        
    </div>

    <div class="mt-5">
        <button class="btn btn-secondary" onclick="toggle()">Toggle</button>       
        <div id="alert1">Toggle this content.</div>             
    </div>


    <div class="mt-5">
        <input class="form-control mb-3" id="task" type="text">
        <button class="btn btn-sm btn-primary" onclick="addToList()">Add</button>
        <button class="ms-3 btn btn-sm btn-danger" onclick="clearList()">Clear</button>

        <ul id="list"></ul>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://unpkg.com/htmx.org@1.9.11" integrity="sha384-0gxUXCCR8yv9FM2b+U3FDbsKthCI66oH5IA9fHppQq9DDMHuMauqq1ZHBpJxQ0J0" crossorigin="anonymous"></script>
  
<script>
    function show() {
        const btn = document.getElementById("btn");
        const alert = document.getElementById("myalert");
        alert.hidden = false;
        btn.hidden = true;
    }

    function toggle() {
        const alert = document.getElementById('alert1')
        alert.hidden = alert.hidden ? false : true; 
    }

    function remove() {
        const btn = document.getElementById("btn");
        const alert = document.getElementById("myalert");
        alert.hidden = true;
        btn.hidden = false;
    }

    function addToList() {
        const task = document.getElementById("task");
        const list = document.getElementById("list");
        const li = document.createElement("li");
        li.innerText = task.value;
        list.appendChild(li); 
        task.value = "";
        task.focus();
    }

    function clearList() {
        const list = document.getElementById("list");
        //list.innerHTML = "";
        while (list.firstChild) {
            list.firstChild.remove();
        } 
    }

</script>
</body>
</html>
